    <script>
        // Wait for the JMPOTTERS app to initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Product page initialized');
            
            // Setup close button
            const closeBtn = document.getElementById('closeBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    if (document.referrer && document.referrer.includes(window.location.hostname)) {
                        window.history.back();
                    } else {
                        window.location.href = 'index.html';
                    }
                });
            }
            
            // Check if JMPOTTERS app is loaded
            if (!window.JMPOTTERS) {
                console.error('❌ JMPOTTERS app not loaded!');
                showError('Application failed to load. Please refresh the page.');
                return;
            }
            
            console.log('✅ JMPOTTERS app found:', window.JMPOTTERS);
            
            // Get slug from URL
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            
            if (!slug) {
                showError('No product specified in URL.');
                return;
            }
            
            // Use the JMPOTTERS app to load the product
            loadProductBySlug(slug);
        });
        
        async function loadProductBySlug(slug) {
            const productViewer = document.getElementById('productViewer');
            
            try {
                console.log('Loading product with slug:', slug);
                
                if (window.JMPOTTERS && window.JMPOTTERS.loadSingleProductBySlug) {
                    await window.JMPOTTERS.loadSingleProductBySlug(slug);
                } else {
                    if (window.JMPOTTERS && window.JMPOTTERS.initializePage) {
                        await window.JMPOTTERS.initializePage();
                        
                        if (window.JMPOTTERS.loadSingleProductBySlug) {
                            await window.JMPOTTERS.loadSingleProductBySlug(slug);
                        } else {
                            throw new Error('Product loading function not available');
                        }
                    } else {
                        throw new Error('JMPOTTERS app not properly initialized');
                    }
                }
                
            } catch (error) {
                console.error('Error loading product:', error);
                showError(`Failed to load product: ${error.message}`);
            }
        }
        
        function showError(message) {
            const productViewer = document.getElementById('productViewer');
            productViewer.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-12 text-center max-w-lg mx-auto">
                    <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <i class="ph ph-warning-circle text-4xl text-red-500"></i>
                    </div>
                    <h2 class="text-2xl font-semibold text-gray-900 mb-3">Error Loading Product</h2>
                    <p class="text-gray-600 mb-8">${message}</p>
                    <button onclick="window.location.href='index.html'" 
                            class="inline-flex items-center justify-center px-6 py-3 bg-gray-900 text-white rounded-xl hover:bg-gray-800 transition-colors duration-200 font-medium">
                        Return to Homepage
                        <i class="ph ph-arrow-right ml-2"></i>
                    </button>
                </div>
            `;
        }
        
        // Update breadcrumb dynamically
        function updateBreadcrumb(product) {
            const categoryLink = document.getElementById('categoryLink');
            const productName = document.getElementById('productName');
            
            if (product) {
                const categoryName = product.category_name || 'Category';
                const categorySlug = product.category_slug || 'mensfootwear';
                
                categoryLink.innerHTML = `<a href="${categorySlug}.html" class="text-gray-700 hover:text-[#d4af37] transition-colors duration-200 font-medium">${categoryName}</a>`;
                productName.textContent = product.name;
            }
        }
        
        // Make updateBreadcrumb available globally
        window.updateProductBreadcrumb = updateBreadcrumb;
    </script>
