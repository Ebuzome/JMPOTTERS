    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary-50: #EEF2FF;
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;
            --success-500: #22C55E;
            --danger-500: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Dark header specific */
            --glass-dark: rgba(12, 15, 21, 0.92);
            --glass-blur: blur(16px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }
        
        /* ========== HEADER – DARK GLASS, CENTERED LOGO, HAMBURGER LEFT ========== */
        
        /* Left side: hamburger button */
        
        /* Center: Logo enlarged */
        
        /* Right side: icons (cart + wishlist) */
        
        /* Mobile Navigation (Left Drawer) */
        
        /* ========== FOOTER – DARK LUXURY ========== */
        footer {
            background: linear-gradient(145deg, #0a0d12 0%, #05070a 100%);
            color: #eef2f5;
            padding: 64px 0 32px;
            margin-top: 80px;
            border-top: 1px solid rgba(99, 102, 241, 0.25);
        }
        @media (min-width: 640px) {
        }
        @media (min-width: 768px) {
        }
        .footer-column h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary-400);
            font-weight: 600;
            position: relative;
        }
        .footer-links li {
            margin-bottom: 10px;
        }
        .footer-links a {
            color: #cfdee9;
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer-links a:hover {
            color: var(--primary-400);
            transform: translateX(5px);
        }
        .social-links a {
            background: rgba(255,255,255,0.06);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .social-links a:hover {
            background: var(--primary-600);
            transform: translateY(-3px);
            color: #0a0d12;
        }
        
        /* Adjust main content to not be hidden under fixed header */
        main {
            padding-top: 100px !important;
        }
        
        /* ===== Product Page Original Styles (keep all) ===== */
        .product-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-8);
            max-width: 1280px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        @media (min-width: 768px) {
            .product-container {
                grid-template-columns: 1fr 1fr;
                gap: var(--space-10);
            }
        }
        .product-image-section {
            background: linear-gradient(135deg, var(--gray-50) 0%, white 100%);
            padding: var(--space-8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border-radius: var(--radius-xl);
        }
        .product-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .product-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: var(--radius-lg);
            transition: transform var(--transition);
        }
        .magnify-icon {
            position: absolute;
            bottom: var(--space-3);
            right: var(--space-3);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity var(--transition-fast);
            pointer-events: none;
        }
        .product-image-section:hover .magnify-icon {
            opacity: 1;
        }
        .product-details {
            padding: var(--space-6) var(--space-6) var(--space-6) 0;
        }
        @media (max-width: 768px) {
            .product-details {
                padding: var(--space-5);
            }
        }
        .product-title {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.02em;
            color: var(--gray-900);
            margin-bottom: var(--space-4);
        }
        .price-section {
            display: flex;
            align-items: baseline;
            gap: var(--space-3);
            margin-bottom: var(--space-5);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--gray-200);
        }
        .current-price {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: var(--primary-600);
        }
        .stock-tile, .description-tile, .variant-tile, .quantity-tile {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-5);
            transition: all var(--transition-fast);
        }
        .stock-tile:hover, .description-tile:hover, .variant-tile:hover, .quantity-tile:hover {
            border-color: var(--gray-300);
            background: white;
        }
        .tile-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            margin-bottom: var(--space-2);
            font-weight: 600;
        }
        .color-options, .size-options {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }
        .color-option, .size-option {
            padding: var(--space-2) var(--space-3);
            background: white;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .color-option.selected, .size-option.selected {
            border-color: var(--primary-500);
            background: var(--primary-50);
            color: var(--primary-700);
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }
        .quantity-btn {
            width: 2.5rem;
            height: 2.5rem;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .quantity-btn:hover {
            background: var(--primary-500);
            border-color: var(--primary-500);
            color: white;
        }
        #productQuantity {
            width: 4rem;
            height: 2.5rem;
            text-align: center;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
        }
        .bulk-options {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }
        .bulk-option {
            padding: var(--space-1) var(--space-3);
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 0.7rem;
            cursor: pointer;
        }
        .bulk-option.active {
            background: var(--primary-500);
            border-color: var(--primary-500);
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: var(--space-4);
            margin-top: var(--space-6);
        }
        .action-btn {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            border: none;
        }
        .btn-add-cart {
            background: var(--gray-900);
            color: white;
        }
        .btn-add-cart:hover {
            background: var(--primary-600);
            transform: translateY(-2px);
        }
        .btn-wishlist {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }
        .btn-wishlist.active {
            background: var(--danger-500);
            border-color: var(--danger-500);
            color: white;
        }
        .recommendations-section {
            max-width: 1280px;
            margin: var(--space-12) auto 0;
        }
        .recommendations-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-3);
            border-bottom: 2px solid var(--gray-200);
        }
        .horizontal-scroll {
            display: flex;
            gap: var(--space-4);
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: var(--space-2) var(--space-1) var(--space-4);
        }
        .recommendation-card {
            flex: 0 0 220px;
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--gray-200);
            transition: var(--transition-fast);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .recommendation-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .rec-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--gray-100);
        }
        .rec-info {
            padding: var(--space-3);
        }
        .rec-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: var(--space-1);
        }
        .rec-price {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-600);
        }
        
        /* REMOVED: All .cart-panel, .cart-header, .cart-items, .cart-footer styles */
        
        .notification-container {
            position: fixed;
            top: 5rem;
            right: var(--space-4);
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        .notification {
            background: white;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            animation: slideIn 0.3s ease;
            border-left: 3px solid;
        }
        .dark-mode .notification {
            background: var(--dark-surface);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        .skeleton {
            background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @media (max-width: 640px) {
            .action-buttons { flex-direction: column; }
            .recommendation-card { flex: 0 0 160px; }
            .rec-image { height: 140px; }
        }
        
        /* Modal styles (from original) */
        .checkout-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .checkout-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
        }
        .checkout-modal-container {
            position: relative;
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 2rem;
            animation: modalFadeIn 0.3s ease;
        }
        .dark-mode .checkout-modal-container {
            background: var(--dark-surface);
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .checkout-modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn-submit {
            background: #0f172a;
            color: white;
            flex: 1;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <!-- Shared header and mobile nav injected by shared-layout.js -->
    <div id="shared-header"></div>
    <div id="shared-mobile-nav"></div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        <!-- Loading State -->
        <div id="loadingState" class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="grid md:grid-cols-2 min-h-[500px]">
                <div class="p-8 flex items-center justify-center">
                    <div class="w-full max-w-md aspect-square rounded-xl skeleton"></div>
                </div>
                <div class="p-8 space-y-4">
                    <div class="h-8 w-3/4 rounded-lg skeleton"></div>
                    <div class="h-6 w-1/3 rounded-lg skeleton"></div>
                    <div class="h-20 w-full rounded-xl skeleton"></div>
                    <div class="h-12 w-32 rounded-lg skeleton"></div>
                    <div class="flex gap-3"><div class="h-12 w-20 rounded-lg skeleton"></div><div class="h-12 w-20 rounded-lg skeleton"></div><div class="h-12 w-20 rounded-lg skeleton"></div></div>
                </div>
            </div>
        </div>

        <!-- Product Viewer -->
        <div id="productViewer"></div>

        <!-- You May Also Like Section -->
        <div id="recommendationsSection" class="recommendations-section" style="display: none;">
            <div class="recommendations-header">
                <h3 class="recommendations-title"><i class="fas fa-heart"></i> You May Also Like</h3>
                <div class="scroll-hint"><i class="fas fa-arrow-right"></i> Scroll for more</div>
            </div>
            <div id="recommendationsContainer" class="horizontal-scroll"></div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="bg-white rounded-2xl shadow-lg p-12 text-center max-w-lg mx-auto hidden">
            <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-semibold mb-3">Error Loading Product</h2>
            <p id="errorMessage" class="text-gray-600 mb-8">Product not available or has been removed.</p>
            <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-gray-900 text-white rounded-xl hover:bg-gray-800 transition-colors">
                Return to Home <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </main>

    <!-- REMOVED: Cart Panel HTML (cartOverlay and cartPanel divs) -->
    <!-- REMOVED: Cart Overlay and Cart Panel - Now redirects to cart.html -->

    <!-- Wishlist Panel (kept as is) -->
    <div class="overlay" id="wishlistOverlay"></div>
    <div class="wishlist-panel" id="wishlistPanel" style="position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: white; z-index: 1100; transition: right 0.3s; display: flex; flex-direction: column; overflow-y: auto;">
        <div class="cart-header" style="padding: 1.5rem; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
            <h3>Your Wishlist</h3>
            <button class="close-wishlist" style="width: 2rem; height: 2rem; background: #f3f4f6; border: none; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div class="wishlist-items" id="wishlistItems" style="padding: 1rem;">
            <div class="cart-empty" style="text-align: center; padding: 2rem; color: #6b7280;">Your wishlist is empty</div>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Signup Modal -->
    <div id="checkoutSignupModal" class="checkout-modal" style="display: none;">
        <div class="checkout-modal-overlay"></div>
        <div class="checkout-modal-container">
            <button class="checkout-modal-close" id="closeModalBtn">&times;</button>
            <div class="checkout-modal-header" style="text-align: center; margin-bottom: 1.5rem;">
                <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #d4af37, #f59e0b); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: white;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Complete Your Order</h2>
                <p style="color: #64748b; font-size: 0.875rem;">Please provide your details to continue</p>
            </div>
            <form id="checkoutSignupForm">
                <div class="form-group">
                    <label>Full Name <span style="color: #dc2626;">*</span></label>
                    <input type="text" id="checkoutFullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email <span style="color: #dc2626;">*</span></label>
                    <input type="email" id="checkoutEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone <span style="color: #dc2626;">*</span></label>
                    <input type="tel" id="checkoutPhone" required placeholder="08012345678">
                </div>
                <div class="form-group">
                    <label>Address <span style="color: #dc2626;">*</span></label>
                    <textarea id="checkoutAddress" rows="2" required placeholder="Your delivery address"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City <span style="color: #dc2626;">*</span></label>
                        <input type="text" id="checkoutCity" required placeholder="Lagos">
                    </div>
                    <div class="form-group">
                        <label>State <span style="color: #dc2626;">*</span></label>
                        <select id="checkoutState" required>
                            <option value="">Select</option>
                            <option value="Lagos">Lagos</option>
                            <option value="Abuja">Abuja</option>
                            <option value="Rivers">Rivers</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelCheckoutBtn" style="flex: 1; padding: 0.75rem; border-radius: 12px; font-weight: 600; background: #f1f5f9; border: none; cursor: pointer;">Cancel</button>
                    <button type="submit" class="btn-submit" id="checkoutSubmitBtn" style="flex: 1;">
                        <span class="btn-text">Continue</span>
                        <span class="btn-loading" style="display: none;"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
                    </button>
                </div>
            </form>
            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: #94a3b8;">
                <p>By continuing, you agree to our <a href="#">Terms</a></p>
            </div>
        </div>
    </div>

        <!-- Shared footer and WhatsApp float injected by shared-layout.js -->
    <div id="shared-footer"></div><!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Mobile nav, cart icon, and wishlist panel handled by shared-layout.js
            
            // Checkout modal
            const checkoutModal = document.getElementById('checkoutSignupModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const cancelBtn = document.getElementById('cancelCheckoutBtn');
            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', function() {
                    checkoutModal.style.display = 'none';
                    document.body.style.overflow = '';
                });
            }
            if (cancelBtn) {
                cancelBtn.addEventListener('click', function() {
                    checkoutModal.style.display = 'none';
                    document.body.style.overflow = '';
                });
            }
            const modalOverlay = document.querySelector('.checkout-modal-overlay');
            if (modalOverlay) {
                modalOverlay.addEventListener('click', function() {
                    checkoutModal.style.display = 'none';
                    document.body.style.overflow = '';
                });
            }
            
            // ESC key to close panels (removed cart panel reference)
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    wishlistPanel?.classList.remove('active');
                    wishlistOverlay?.classList.remove('active');
                    checkoutModal?.style.display = 'none';
                    document.body.style.overflow = '';
                }
            });
            
            // Update cart count on page load
            function updateCartCount() {
                const cart = JSON.parse(localStorage.getItem('jmpotters_cart')) || [];
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                const cartCountSpan = document.getElementById('cartCount');
                if (cartCountSpan) {
                    cartCountSpan.innerText = totalItems;
                    cartCountSpan.style.display = totalItems > 0 ? 'flex' : 'none';
                }
            }
            updateCartCount();
            
            // Check for app.js and load product
            if (!window.JMPOTTERS) {
                console.error('❌ JMPOTTERS app not loaded!');
                const loading = document.getElementById('loadingState');
                const error = document.getElementById('errorState');
                if (loading) loading.style.display = 'none';
                if (error) error.style.display = 'block';
                const errorMsg = document.getElementById('errorMessage');
                if (errorMsg) errorMsg.textContent = 'Application failed to load. Please refresh the page.';
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            if (!slug) {
                showError('No product specified in URL.');
                return;
            }
        });
        
        function showError(message) {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const errorMessage = document.getElementById('errorMessage');
            if (loadingState) loadingState.style.display = 'none';
            if (errorState) {
                errorState.style.display = 'block';
                if (errorMessage) errorMessage.textContent = message;
            }
        }
        
        window.updateProductBreadcrumb = function(product) {
            const categoryLink = document.getElementById('categoryLink');
            const productNameSpan = document.getElementById('productName');
            if (product) {
                const categoryName = product.category_name || 'Category';
                const categorySlug = product.category_slug || 'mensfootwear';
                if (categoryLink) categoryLink.innerHTML = `<a href="${categorySlug}.html" class="text-gray-700 hover:text-primary-600 transition-colors">${categoryName}</a>`;
                if (productNameSpan) productNameSpan.textContent = product.name;
            }
        };
    </script>
</body>
</html>
