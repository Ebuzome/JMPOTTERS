<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Your App.js - This is CRITICAL -->

    <style>
        /* Custom styles that work with app.js rendered content */
        * {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f8fafc;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
        }

        /* Custom animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-slide-in {
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .animate-slide-right {
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Loading skeleton animation */
        .shimmer {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Focus styles */
        *:focus-visible {
            outline: 2px solid #d4af37;
            outline-offset: 2px;
        }

        /* Custom styles for app.js rendered elements */
        .product-container {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            gap: clamp(1.5rem, 4vw, 3rem) !important;
            background: white !important;
            border-radius: 2rem !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15) !important;
            border: 1px solid rgba(203, 213, 225, 0.2) !important;
            overflow: hidden !important;
            animation: fadeIn 0.5s ease !important;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr !important;
            }
        }

        .product-image-container {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%) !important;
            padding: clamp(1.5rem, 5vw, 3rem) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-right: 1px solid rgba(203, 213, 225, 0.3) !important;
        }

        .product-image {
            width: 100% !important;
            max-width: 500px !important;
            height: auto !important;
            aspect-ratio: 1 !important;
            object-fit: contain !important;
            border-radius: 1.5rem !important;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        .product-image:hover {
            transform: scale(1.02) !important;
        }

        .product-details {
            padding: clamp(1.5rem, 5vw, 3rem) !important;
            background: white !important;
        }

        .product-title {
            font-size: clamp(1.8rem, 4vw, 2.5rem) !important;
            font-weight: 700 !important;
            line-height: 1.2 !important;
            letter-spacing: -0.02em !important;
            color: #0f172a !important;
            margin-bottom: 1.5rem !important;
        }

        /* Price Container - Minimalistic Tile */
        .price-container {
            background: #f8fafc !important;
            border-radius: 1.5rem !important;
            padding: 1.5rem !important;
            margin-bottom: 1.5rem !important;
            border: 1px solid #e2e8f0 !important;
            transition: all 0.3s ease !important;

        .price-container:hover {
            border-color: #d4af37 !important;
            box-shadow: 0 8px 20px -10px rgba(212, 175, 55, 0.2) !important;
        }

        .current-price {

            font-weight: 700 !important;
            color: #d4af37 !important;

        /* Stock Status - Minimalistic */

            align-items: center !important;
            gap: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 2rem !important;
            font-size: 0.95rem !important;
            font-weight: 500 !important;
            margin-bottom: 2rem !important;
            transition: all 0.3s ease !important;

        .stock-status:not(.out-of-stock) {
            color: #059669 !important;

        .stock-status.out-of-stock {

        }

        /* Detail Tile - Minimalistic Design */

            border: 1px solid #e2e8f0 !important;
            border-radius: 1.5rem !important;
            padding: 1.5rem !important;
            margin-bottom: 1.5rem !important;
            transition: all 0.3s ease !important;
        }

        .detail-tile:hover {
            border-color: #d4af37 !important;
            box-shadow: 0 8px 20px -10px rgba(212, 175, 55, 0.1) !important;
        }

        .tile-title {
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.05em !important;
            color: #64748b !important;
            margin-bottom: 1rem !important;
        }

        .product-description {
            color: #334155 !important;
            line-height: 1.7 !important;
            font-size: 0.95rem !important;
        }

        /* Color Options */
        .color-options {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 0.75rem !important;
        }

        .color-option {
            padding: 0.6rem 1.2rem !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 2rem !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
            color: #334155 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
        }

        .color-option:hover {
            border-color: #d4af37 !important;
            background: #fef9e7 !important;
        }

        .color-option.selected {
            background: #d4af37 !important;
            border-color: #d4af37 !important;
            color: white !important;
        }

        /* Size Options */
        .size-options {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 0.75rem !important;
        }

        .size-option {
            min-width: 3.5rem !important;
            padding: 0.6rem 0 !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 0.75rem !important;
            font-size: 0.95rem !important;
            font-weight: 600 !important;
            color: #334155 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            text-align: center !important;
        }

        .size-option:hover:not(.out-of-stock) {
            border-color: #d4af37 !important;
            background: #fef9e7 !important;
            transform: translateY(-1px) !important;
        }

        .size-option.selected {
            background: #d4af37 !important;
            border-color: #d4af37 !important;
            color: white !important;
        }

        .size-option.out-of-stock {
            opacity: 0.5 !important;
            cursor: not-allowed !important;
            text-decoration: line-through !important;
            background: #f1f5f9 !important;
        }

        .size-option.low-stock {
            position: relative !important;
        }

        .size-option.low-stock::after {
            content: 'Low' !important;
            position: absolute !important;
            top: -6px !important;
            right: -6px !important;
            background: #f59e0b !important;
            color: white !important;
            font-size: 0.65rem !important;
            padding: 2px 6px !important;
            border-radius: 1rem !important;
            font-weight: 600 !important;
        }

        /* Selection Summary */
        .selection-summary {
            background: #fef9e7 !important;
            border: 1px solid #d4af37 !important;
            border-radius: 1rem !important;
            padding: 1.25rem !important;
            margin: 1.5rem 0 !important;
            animation: fadeIn 0.3s ease !important;
        }

        .selected-variant {
            font-size: 1rem !important;
            font-weight: 600 !important;
            color: #0f172a !important;
            margin-bottom: 0.5rem !important;
        }

        .stock-info {
            display: flex !important;
            align-items: center !important;
            gap: 0.5rem !important;
            color: #475569 !important;
            font-size: 0.9rem !important;
        }

        /* Quantity Controls */
        .quantity-controls {
            display: flex !important;
            align-items: center !important;
            gap: 0.75rem !important;
            margin-bottom: 1rem !important;
        }

        .quantity-btn {
            width: 2.75rem !important;
            height: 2.75rem !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 0.75rem !important;
            font-size: 1.2rem !important;
            font-weight: 600 !important;
            color: #334155 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .quantity-btn:hover {
            background: #d4af37 !important;
            border-color: #d4af37 !important;
            color: white !important;
        }

        #productQuantity {
            width: 4.5rem !important;
            height: 2.75rem !important;
            text-align: center !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 0.75rem !important;
            font-size: 1rem !important;
            font-weight: 600 !important;
            color: #0f172a !important;
        }

        #productQuantity:focus {
            outline: none !important;
            border-color: #d4af37 !important;
        }

        /* Bulk Options */
        .bulk-options {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 0.5rem !important;
        }

        .bulk-option {
            padding: 0.5rem 1rem !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 2rem !important;
            font-size: 0.85rem !important;
            font-weight: 500 !important;
            color: #475569 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
        }

        .bulk-option:hover {
            background: #fef9e7 !important;
            border-color: #d4af37 !important;
        }

        .bulk-option.active {
            background: #d4af37 !important;
            border-color: #d4af37 !important;
            color: white !important;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex !important;
            gap: 1rem !important;
            margin: 2rem 0 !important;
        }

        .action-btn {
            flex: 1 !important;
            padding: 1rem 1.5rem !important;
            font-size: 1rem !important;
            font-weight: 600 !important;
            border: none !important;
            border-radius: 1rem !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 0.5rem !important;
        }

        .btn-primary {
            background: #0f172a !important;
            color: white !important;
        }

        .btn-primary:hover {
            background: #d4af37 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 10px 25px -8px rgba(212, 175, 55, 0.4) !important;
        }

        .btn-secondary {
            background: white !important;
            color: #334155 !important;
            border: 1px solid #e2e8f0 !important;
        }

        .btn-secondary:hover {
            border-color: #d4af37 !important;
            color: #d4af37 !important;
        }

        .btn-secondary.active {
            background: #dc2626 !important;
            border-color: #dc2626 !important;
            color: white !important;
        }

        /* Cart Panel - Minimalistic Design */
        .cart-panel {
            position: fixed !important;
            top: 0 !important;
            right: -100% !important;
            width: 100% !important;
            max-width: 420px !important;
            height: 100vh !important;
            background: white !important;
            z-index: 1000 !important;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
            box-shadow: -10px 0 30px -15px rgba(0, 0, 0, 0.2) !important;
            display: flex !important;
            flex-direction: column !important;
        }

        .cart-panel.active {
            right: 0 !important;
        }

        .cart-header {
            padding: 1.5rem !important;
            border-bottom: 1px solid #e2e8f0 !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .cart-header h3 {
            font-size: 1.25rem !important;
            font-weight: 600 !important;
            color: #0f172a !important;
        }

        .close-cart {
            width: 2.5rem !important;
            height: 2.5rem !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 0.75rem !important;
            color: #64748b !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .close-cart:hover {
            background: #dc2626 !important;
            border-color: #dc2626 !important;
            color: white !important;
        }

        .cart-items {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 1.5rem !important;
        }

        .cart-empty {
            text-align: center !important;
            padding: 3rem 1rem !important;
            color: #94a3b8 !important;
        }

        .cart-item {
            display: flex !important;
            align-items: center !important;
            gap: 1rem !important;
            padding: 1rem !important;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 1rem !important;
            margin-bottom: 0.75rem !important;
            transition: all 0.2s ease !important;
        }

        .cart-item:hover {
            border-color: #d4af37 !important;
        }

        .cart-item-image {
            width: 4rem !important;
            height: 4rem !important;
            border-radius: 0.75rem !important;
            overflow: hidden !important;
            background: white !important;
            border: 1px solid #e2e8f0 !important;
        }

        .cart-item-image img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        .cart-item-details {
            flex: 1 !important;
        }

        .cart-item-name {
            font-weight: 600 !important;
            color: #0f172a !important;
            margin-bottom: 0.25rem !important;
            font-size: 0.95rem !important;
        }

        .cart-item-price {
            color: #d4af37 !important;
            font-weight: 600 !important;
            font-size: 0.9rem !important;
        }

        .cart-item-remove {
            width: 2rem !important;
            height: 2rem !important;
            background: #fee2e2 !important;
            border: none !important;
            border-radius: 0.5rem !important;
            color: #dc2626 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .cart-item-remove:hover {
            background: #dc2626 !important;
            color: white !important;
        }

        .cart-footer {
            padding: 1.5rem !important;
            border-top: 1px solid #e2e8f0 !important;
            background: #f8fafc !important;
        }

        .cart-total {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            margin-bottom: 1rem !important;
            font-size: 1.1rem !important;
            font-weight: 600 !important;
            color: #0f172a !important;
        }

        .cart-total-amount {
            color: #d4af37 !important;
            font-size: 1.25rem !important;
        }

        .cart-checkout-btn {
            width: 100% !important;
            padding: 1rem !important;
            background: #0f172a !important;
            color: white !important;
            border: none !important;
            border-radius: 1rem !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            margin-bottom: 0.75rem !important;
        }

        .cart-checkout-btn:hover {
            background: #d4af37 !important;
        }

        .cart-whatsapp-btn {
            width: 100% !important;
            padding: 1rem !important;
            background: #25d366 !important;
            color: white !important;
            border: none !important;
            border-radius: 1rem !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            display: block !important;
            text-align: center !important;
            text-decoration: none !important;
        }

        .cart-whatsapp-btn:hover {
            background: #128c7e !important;
        }

        /* Overlay */
        .overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(4px) !important;
            z-index: 999 !important;
            display: none !important;
            transition: all 0.3s ease !important;
        }

        .overlay.active {
            display: block !important;
        }

        /* Notification */
        .notification-container {
            position: fixed !important;
            top: 1rem !important;
            right: 1rem !important;
            z-index: 1100 !important;
        }

        .notification {
            padding: 1rem 1.5rem !important;
            background: white !important;
            border-left: 4px solid !important;
            border-radius: 0.75rem !important;
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.2) !important;
            display: flex !important;
            align-items: center !important;
            gap: 0.75rem !important;
            margin-bottom: 0.75rem !important;
            animation: slideInRight 0.3s ease !important;

        }

        .notification.success { border-left-color: #059669 !important; }
        .notification.error { border-left-color: #dc2626 !important; }
        .notification.warning { border-left-color: #d4af37 !important; }
        .notification.info { border-left-color: #3b82f6 !important; }

        .notification i {
            font-size: 1.25rem !important;
        }

        .notification.success i { color: #059669 !important; }
        .notification.error i { color: #dc2626 !important; }
        .notification.warning i { color: #d4af37 !important; }
        .notification.info i { color: #3b82f6 !important; }
    </style>
</head>

                </div>

                <!-- Details Skeleton -->
                <div class="p-8 lg:p-12 space-y-6">
                    <div class="h-8 w-3/4 bg-gray-200 rounded-lg shimmer"></div>
                    <div class="h-8 w-1/2 bg-gray-200 rounded-lg shimmer"></div>
                    <div class="h-16 w-48 bg-gray-200 rounded-xl shimmer"></div>
                    <div class="space-y-3">
                        <div class="h-4 w-full bg-gray-200 rounded shimmer"></div>
                        <div class="h-4 w-5/6 bg-gray-200 rounded shimmer"></div>
                        <div class="h-4 w-4/6 bg-gray-200 rounded shimmer"></div>
                    </div>
                    <div class="flex gap-3">
                        <div class="h-12 w-24 bg-gray-200 rounded-lg shimmer"></div>
                        <div class="h-12 w-24 bg-gray-200 rounded-lg shimmer"></div>
                        <div class="h-12 w-24 bg-gray-200 rounded-lg shimmer"></div>
                    </div>
                    <div class="flex gap-4 pt-4">
                        <div class="h-14 flex-1 bg-gray-200 rounded-xl shimmer"></div>
                        <div class="h-14 w-14 bg-gray-200 rounded-xl shimmer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Viewer - This is where app.js renders the product -->
        <div id="productViewer" class="animate-fade-in"></div>

        <!-- Error State -->
        <div id="errorState" class="bg-white rounded-2xl shadow-xl border border-gray-100 p-12 text-center max-w-lg mx-auto" style="display: none;">
            <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-semibold text-gray-900 mb-3">Error Loading Product</h2>
            <p id="errorMessage" class="text-gray-600 mb-8">The product you're looking for is not available or has been removed.</p>
            <a href="index.html" class="inline-flex items-center justify-center px-6 py-3 bg-gray-900 text-white rounded-xl hover:bg-gray-800 transition-colors duration-200 font-medium">
                Return to Homepage
                <i class="fas fa-arrow-right ml-2"></i>
            </a>
        </div>
    </main>

    <!-- Cart Panel -->
    <div class="overlay" id="cartOverlay"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button class="close-cart">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">
                <i class="fas fa-shopping-bag text-4xl mb-3 opacity-30"></i>
                <p class="text-gray-500">Your cart is empty</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="cart-total-amount" id="cartTotal">₦0</span>
            </div>
            <button class="cart-checkout-btn" id="checkoutButton">
                <i class="fas fa-shopping-bag mr-2"></i> Proceed to Checkout
            </button>
            <a href="#" class="cart-whatsapp-btn" id="whatsappCheckout" target="_blank">
                <i class="fab fa-whatsapp mr-2"></i> Checkout via WhatsApp
            </a>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Product page initialized');
            
            // Setup close button
            const closeBtn = document.getElementById('closeBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    if (document.referrer && document.referrer.includes(window.location.hostname)) {
                        window.history.back();
                    } else {
                        window.location.href = 'index.html';
                    }
                });
            }

            // Setup cart panel close
            const closeCartBtn = document.querySelector('.close-cart');
            const cartOverlay = document.getElementById('cartOverlay');
            const cartPanel = document.getElementById('cartPanel');

            if (closeCartBtn) {
                closeCartBtn.addEventListener('click', function() {
                    cartPanel.classList.remove('active');
                    cartOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }

            if (cartOverlay) {
                cartOverlay.addEventListener('click', function() {
                    cartPanel.classList.remove('active');
                    cartOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }

            // Close with Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    cartPanel?.classList.remove('active');
                    cartOverlay?.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
            
            // Check if JMPOTTERS app is loaded
            if (!window.JMPOTTERS) {
                console.error('❌ JMPOTTERS app not loaded!');
                showError('Application failed to load. Please refresh the page.');
                return;
            }
            
            console.log('✅ JMPOTTERS app found:', window.JMPOTTERS);
            
            // Get slug from URL
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            
            if (!slug) {
                showError('No product specified in URL.');
                return;
            }
        });

        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // Update breadcrumb dynamically
        function updateBreadcrumb(product) {
            const categoryLink = document.getElementById('categoryLink');
            const productName = document.getElementById('productName');
            
            if (product) {
                const categoryName = product.category_name || 'Category';
                const categorySlug = product.category_slug || 'mensfootwear';
                
                categoryLink.innerHTML = `<a href="${categorySlug}.html" class="text-gray-700 hover:text-[#d4af37] transition-colors duration-200 font-medium">${categoryName}</a>`;
                productName.textContent = product.name;
            }
        }

        // Make updateBreadcrumb available globally
        window.updateProductBreadcrumb = updateBreadcrumb;
    </script>
</body>
</html>
