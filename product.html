<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loading Product... | JMPOTTERS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- PhotoSwipe for image magnification -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/photoswipe.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/umd/photoswipe.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/umd/photoswipe-lightbox.umd.min.js"></script>
    
    <!-- Your App.js -->
    <script src="app.js" defer></script>
    
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary-50: #EEF2FF;
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;
            --success-500: #22C55E;
            --success-600: #16A34A;
            --warning-500: #EAB308;
            --warning-600: #CA8A04;
            --danger-500: #EF4444;
            --danger-600: #DC2626;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }
        
        /* Navigation */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200);
        }
        
        /* Product Container */
        .product-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-6);
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        
        @media (min-width: 768px) {
            .product-container {
                grid-template-columns: 1fr 1fr;
                gap: var(--space-8);
            }
        }
        
        /* Image Section */
        .product-image-section {
            background: linear-gradient(135deg, var(--gray-50) 0%, white 100%);
            padding: var(--space-6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        
        .product-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .product-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: var(--radius-lg);
            transition: transform var(--transition);
        }
        
        .magnify-icon {
            position: absolute;
            bottom: var(--space-3);
            right: var(--space-3);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity var(--transition-fast);
            pointer-events: none;
        }
        
        .product-image-section:hover .magnify-icon {
            opacity: 1;
        }
        
        /* Product Details */
        .product-details {
            padding: var(--space-6);
        }
        
        @media (min-width: 768px) {
            .product-details {
                padding: var(--space-8) var(--space-8) var(--space-8) 0;
            }
        }
        
        .product-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: var(--gray-900);
            margin-bottom: var(--space-3);
        }
        
        /* Price */
        .price-section {
            display: flex;
            align-items: baseline;
            gap: var(--space-3);
            margin-bottom: var(--space-5);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .current-price {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: var(--primary-600);
        }
        
        .original-price {
            font-size: 1rem;
            color: var(--gray-400);
            text-decoration: line-through;
        }
        
        .discount-badge {
            background: var(--danger-50);
            color: var(--danger-600);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius);
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        /* Stock Status */
        .stock-status {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            background: var(--gray-100);
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: var(--space-5);
        }
        
        .stock-status.in-stock {
            background: #ECFDF5;
            color: #059669;
        }
        
        .stock-status.low-stock {
            background: #FEFCE8;
            color: #D97706;
        }
        
        .stock-status.out-of-stock {
            background: #FEF2F2;
            color: #DC2626;
        }
        
        /* Info Cards */
        .info-card {
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            border: 1px solid var(--gray-200);
            transition: all var(--transition-fast);
        }
        
        .info-card:hover {
            border-color: var(--primary-200);
            background: white;
        }
        
        .info-card-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            margin-bottom: var(--space-2);
            font-weight: 600;
        }
        
        .info-card-content {
            color: var(--gray-700);
            line-height: 1.6;
            font-size: 0.875rem;
        }
        
        /* Variants */
        .variant-group {
            margin-bottom: var(--space-5);
        }
        
        .variant-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: var(--space-2);
            display: block;
        }
        
        .color-options {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }
        
        .color-option {
            padding: var(--space-2) var(--space-3);
            background: var(--gray-100);
            border: 1.5px solid transparent;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .color-option:hover {
            border-color: var(--primary-300);
            background: white;
        }
        
        .color-option.selected {
            border-color: var(--primary-500);
            background: var(--primary-50);
            color: var(--primary-700);
        }
        
        .size-options {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }
        
        .size-option {
            min-width: 3rem;
            padding: var(--space-2) var(--space-3);
            background: var(--gray-100);
            border: 1.5px solid transparent;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
        }
        
        .size-option:hover:not(.disabled) {
            border-color: var(--primary-300);
            background: white;
        }
        
        .size-option.selected {
            border-color: var(--primary-500);
            background: var(--primary-50);
            color: var(--primary-700);
        }
        
        .size-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        
        /* Selection Summary */
        .selection-summary {
            background: var(--primary-50);
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-4) 0;
            font-size: 0.8rem;
        }
        
        .selected-variant {
            font-weight: 600;
            color: var(--primary-700);
            margin-bottom: var(--space-1);
        }
        
        /* Quantity */
        .quantity-section {
            margin-bottom: var(--space-5);
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .quantity-btn {
            width: 2.25rem;
            height: 2.25rem;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quantity-btn:hover {
            background: var(--primary-500);
            border-color: var(--primary-500);
            color: white;
        }
        
        #productQuantity {
            width: 3.5rem;
            height: 2.25rem;
            text-align: center;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-800);
        }
        
        .bulk-options {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            margin-top: var(--space-3);
        }
        
        .bulk-option {
            padding: var(--space-1) var(--space-3);
            background: var(--gray-100);
            border: none;
            border-radius: var(--radius);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .bulk-option:hover, .bulk-option.active {
            background: var(--primary-500);
            color: white;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-6);
        }
        
        .action-btn {
            flex: 1;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            border: none;
        }
        
        .btn-add-cart {
            background: var(--gray-900);
            color: white;
        }
        
        .btn-add-cart:hover {
            background: var(--primary-600);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-wishlist {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }
        
        .btn-wishlist:hover {
            border-color: var(--danger-500);
            color: var(--danger-500);
        }
        
        .btn-wishlist.active {
            background: var(--danger-500);
            border-color: var(--danger-500);
            color: white;
        }
        
        /* Cart Panel */
        .cart-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: white;
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
        }
        
        .cart-panel.active {
            right: 0;
        }
        
        .cart-header {
            padding: var(--space-5);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-header h3 {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .close-cart {
            width: 2rem;
            height: 2rem;
            background: var(--gray-100);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .close-cart:hover {
            background: var(--danger-500);
            color: white;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-4);
        }
        
        .cart-item {
            display: flex;
            gap: var(--space-3);
            padding: var(--space-3);
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-3);
        }
        
        .cart-item-image {
            width: 4rem;
            height: 4rem;
            border-radius: var(--radius);
            overflow: hidden;
            background: white;
        }
        
        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .cart-item-details {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: var(--space-1);
        }
        
        .cart-item-price {
            color: var(--primary-600);
            font-weight: 600;
            font-size: 0.8rem;
        }
        
        .cart-item-remove {
            width: 2rem;
            height: 2rem;
            background: #FEE2E2;
            border: none;
            border-radius: var(--radius);
            color: var(--danger-500);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .cart-item-remove:hover {
            background: var(--danger-500);
            color: white;
        }
        
        .cart-footer {
            padding: var(--space-5);
            border-top: 1px solid var(--gray-200);
            background: white;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-4);
            font-weight: 600;
        }
        
        .cart-checkout-btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--gray-900);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: var(--space-3);
        }
        
        .cart-checkout-btn:hover {
            background: var(--primary-600);
        }
        
        .cart-whatsapp-btn {
            width: 100%;
            padding: 0.875rem;
            background: #25D366;
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }
        
        .overlay.active {
            display: block;
        }
        
        /* Notifications */
        .notification-container {
            position: fixed;
            top: 5rem;
            right: var(--space-4);
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        
        .notification {
            background: white;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            animation: slideIn 0.3s ease;
            border-left: 3px solid;
        }
        
        .notification.success { border-left-color: var(--success-500); }
        .notification.error { border-left-color: var(--danger-500); }
        .notification.warning { border-left-color: var(--warning-500); }
        .notification.info { border-left-color: var(--primary-500); }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Loading States */
        .skeleton {
            background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .product-details {
                padding: var(--space-4);
            }
            .action-buttons {
                flex-direction: column;
            }
            .action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2 text-sm">
                    <a href="index.html" class="text-gray-500 hover:text-primary-600 transition-colors">Home</a>
                    <i class="fas fa-chevron-right text-gray-400 text-xs"></i>
                    <span id="categoryLink" class="text-gray-500">Loading...</span>
                    <i class="fas fa-chevron-right text-gray-400 text-xs"></i>
                    <span id="productName" class="text-gray-900 font-semibold truncate max-w-[150px]">Product</span>
                </div>
                
                <div class="flex items-center gap-2">
                    <button id="cartBtn" class="relative w-10 h-10 rounded-xl bg-gray-100 hover:bg-primary-500 hover:text-white transition-all">
                        <i class="fas fa-shopping-bag"></i>
                        <span id="cartCount" class="absolute -top-1 -right-1 w-5 h-5 bg-danger-500 text-white text-xs rounded-full flex items-center justify-center font-semibold hidden">0</span>
                    </button>
                    <button id="wishlistBtn" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-primary-500 hover:text-white transition-all">
                        <i class="far fa-heart"></i>
                    </button>
                    <a href="https://wa.me/2348139583320" target="_blank" class="w-10 h-10 rounded-xl bg-[#25D366] text-white hover:bg-[#128C7E] transition-all flex items-center justify-center">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <button id="closeBtn" class="w-10 h-10 rounded-xl bg-gray-900 text-white hover:bg-gray-800 transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12">
        <!-- Loading State -->
        <div id="loadingState" class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="grid md:grid-cols-2 min-h-[500px]">
                <div class="p-8 flex items-center justify-center">
                    <div class="w-full max-w-md aspect-square rounded-xl skeleton"></div>
                </div>
                <div class="p-8 space-y-4">
                    <div class="h-8 w-3/4 rounded-lg skeleton"></div>
                    <div class="h-6 w-1/3 rounded-lg skeleton"></div>
                    <div class="h-20 w-full rounded-xl skeleton"></div>
                    <div class="h-12 w-32 rounded-lg skeleton"></div>
                    <div class="flex gap-3">
                        <div class="h-12 w-20 rounded-lg skeleton"></div>
                        <div class="h-12 w-20 rounded-lg skeleton"></div>
                        <div class="h-12 w-20 rounded-lg skeleton"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Viewer -->
        <div id="productViewer" class="animate-fade-in"></div>

        <!-- Error State -->
        <div id="errorState" class="bg-white rounded-2xl shadow-lg p-12 text-center max-w-lg mx-auto hidden">
            <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-semibold mb-3">Error Loading Product</h2>
            <p id="errorMessage" class="text-gray-600 mb-8">Product not available or has been removed.</p>
            <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-gray-900 text-white rounded-xl hover:bg-gray-800 transition-colors">
                Return to Home <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </main>

    <!-- Cart Panel -->
    <div class="overlay" id="cartOverlay"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button class="close-cart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="text-center py-8 text-gray-500">Your cart is empty</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">₦0</span>
            </div>
            <button class="cart-checkout-btn" id="checkoutButton">
                <i class="fas fa-shopping-bag"></i> Proceed to Checkout
            </button>
            <a href="#" class="cart-whatsapp-btn" id="whatsappCheckout" target="_blank">
                <i class="fab fa-whatsapp"></i> Checkout via WhatsApp
            </a>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Signup Modal -->
    <div id="checkoutSignupModal" class="checkout-modal" style="display: none;">
        <div class="checkout-modal-overlay"></div>
        <div class="checkout-modal-container">
            <button class="checkout-modal-close" id="closeModalBtn">&times;</button>
            <div class="checkout-modal-header">
                <div class="checkout-modal-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <h2>Complete Your Order</h2>
                <p>Please provide your details to continue</p>
            </div>
            <form id="checkoutSignupForm">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="checkoutFullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="checkoutEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone <span class="required">*</span></label>
                    <input type="tel" id="checkoutPhone" required placeholder="08012345678">
                </div>
                <div class="form-group">
                    <label>Address <span class="required">*</span></label>
                    <textarea id="checkoutAddress" rows="2" required placeholder="Your delivery address"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City <span class="required">*</span></label>
                        <input type="text" id="checkoutCity" required placeholder="Lagos">
                    </div>
                    <div class="form-group">
                        <label>State <span class="required">*</span></label>
                        <select id="checkoutState" required>
                            <option value="">Select</option>
                            <option value="Lagos">Lagos</option>
                            <option value="Abuja">Abuja</option>
                            <option value="Rivers">Rivers</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelCheckoutBtn">Cancel</button>
                    <button type="submit" class="btn-submit" id="checkoutSubmitBtn">
                        <span class="btn-text">Continue</span>
                        <span class="btn-loading" style="display: none;"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
                    </button>
                </div>
            </form>
            <div class="checkout-modal-footer">
                <p>By continuing, you agree to our <a href="#">Terms</a></p>
            </div>
        </div>
    </div>

    <script>
        // Checkout modal styles (inlined from app.js)
        .checkout-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .checkout-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
        }
        .checkout-modal-container {
            position: relative;
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 2rem;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .checkout-modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
        }
        .checkout-modal-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .checkout-modal-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #d4af37, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
        }
        .checkout-modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .checkout-modal-header p {
            color: #64748b;
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .required { color: #dc2626; margin-left: 0.25rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #d4af37;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn-cancel, .btn-submit {
            flex: 1;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-submit {
            background: #0f172a;
            color: white;
        }
        .btn-submit:hover {
            background: #d4af37;
        }
        .checkout-modal-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
            .form-actions { flex-direction: column; }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Setup close button
            const closeBtn = document.getElementById('closeBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    if (document.referrer && document.referrer.includes(window.location.hostname)) {
                        window.history.back();
                    } else {
                        window.location.href = 'index.html';
                    }
                });
            }

            // Setup cart panel close
            const closeCartBtn = document.querySelector('.close-cart');
            const cartOverlay = document.getElementById('cartOverlay');
            const cartPanel = document.getElementById('cartPanel');

            if (closeCartBtn) {
                closeCartBtn.addEventListener('click', function() {
                    cartPanel.classList.remove('active');
                    cartOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }

            if (cartOverlay) {
                cartOverlay.addEventListener('click', function() {
                    cartPanel.classList.remove('active');
                    cartOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    cartPanel?.classList.remove('active');
                    cartOverlay?.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
            
            if (!window.JMPOTTERS) {
                console.error('❌ JMPOTTERS app not loaded!');
                showError('Application failed to load. Please refresh the page.');
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            
            if (!slug) {
                showError('No product specified in URL.');
                return;
            }
        });

        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function updateBreadcrumb(product) {
            const categoryLink = document.getElementById('categoryLink');
            const productName = document.getElementById('productName');
            
            if (product) {
                const categoryName = product.category_name || 'Category';
                const categorySlug = product.category_slug || 'mensfootwear';
                categoryLink.innerHTML = `<a href="${categorySlug}.html" class="text-gray-700 hover:text-primary-600 transition-colors">${categoryName}</a>`;
                productName.textContent = product.name;
            }
        }

        window.updateProductBreadcrumb = updateBreadcrumb;
    </script>
</body>
</html>
