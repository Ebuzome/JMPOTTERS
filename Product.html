<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | JMPOTTERS</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        'jmp': {
                            'gold': '#d69e2e',
                            'gold-light': '#fbbf24',
                            'gold-dark': '#b7791f',
                            'dark': '#0f172a',
                            'darker': '#1a2639',
                            'dark-light': '#1e293b',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
                        'scale-in': 'scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '200% 0' },
                            '100%': { backgroundPosition: '-200% 0' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    },
                    spacing: {
                        '128': '32rem',
                        '144': '36rem',
                    }
                }
            }
        }
    </script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        /* Custom styles that complement Tailwind */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a2639 100%);
            min-height: 100vh;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Hide number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Glassmorphism effects */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-hover {
            transition: all 0.3s ease;
        }
        .glass-hover:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(214, 158, 46, 0.3);
            backdrop-filter: blur(16px);
        }
        
        /* Gradient text */
        .gradient-gold {
            background: linear-gradient(135deg, #d69e2e 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #d69e2e;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #fbbf24;
        }
        
        /* Loading animation */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #2d3748 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="font-sans antialiased text-gray-100 min-h-screen overflow-x-hidden">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Left section with navigation -->
                <div class="flex items-center gap-4">
                    <!-- Back button -->
                    <button onclick="window.history.back()" 
                            class="flex items-center justify-center w-12 h-12 rounded-xl bg-white/5 border border-white/10 text-gray-300 hover:text-jmp-gold hover:border-jmp-gold/30 hover:bg-jmp-gold/10 transition-all duration-300 group">
                        <i class="fas fa-arrow-left text-lg group-hover:-translate-x-0.5 transition-transform"></i>
                    </button>
                    
                    <!-- Home button -->
                    <a href="index.html" 
                       class="flex items-center justify-center w-12 h-12 rounded-xl bg-white/5 border border-white/10 text-gray-300 hover:text-jmp-gold hover:border-jmp-gold/30 hover:bg-jmp-gold/10 transition-all duration-300">
                        <i class="fas fa-home text-lg"></i>
                    </a>
                </div>
                
                <!-- Logo -->
                <a href="index.html" class="text-3xl font-black tracking-tight">
                    <span class="gradient-gold">JMPOTTERS</span>
                </a>
                
                <!-- Right actions -->
                <div class="flex items-center gap-3">
                    <button id="wishlistBtn" class="relative w-12 h-12 rounded-xl bg-white/5 border border-white/10 text-gray-300 hover:text-jmp-gold hover:border-jmp-gold/30 hover:bg-jmp-gold/10 transition-all duration-300 group">
                        <i class="far fa-heart text-xl group-hover:scale-110 transition-transform"></i>
                        <span id="wishlistCount" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center border-2 border-jmp-dark" style="display: none;">0</span>
                    </button>
                    
                    <button id="cartBtn" class="relative w-12 h-12 rounded-xl bg-white/5 border border-white/10 text-gray-300 hover:text-jmp-gold hover:border-jmp-gold/30 hover:bg-jmp-gold/10 transition-all duration-300 group">
                        <i class="fas fa-shopping-bag text-xl group-hover:scale-110 transition-transform"></i>
                        <span id="cartCount" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center border-2 border-jmp-dark" style="display: none;">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
        <!-- Breadcrumb -->
        <nav class="flex items-center gap-2 text-sm text-gray-400 mb-8 animate-fade-in">
            <a href="index.html" class="hover:text-jmp-gold transition-colors">Home</a>
            <i class="fas fa-chevron-right text-xs"></i>
            <a href="#" class="hover:text-jmp-gold transition-colors" id="categoryBreadcrumb">Products</a>
            <i class="fas fa-chevron-right text-xs"></i>
            <span class="text-jmp-gold font-medium" id="productBreadcrumb">Loading...</span>
        </nav>

        <!-- Loading Skeletons -->
        <div id="loadingState" class="animate-pulse-slow">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
                <!-- Image skeleton -->
                <div class="aspect-square rounded-3xl skeleton"></div>
                
                <!-- Details skeleton -->
                <div class="space-y-6">
                    <div class="h-12 w-3/4 skeleton rounded-xl"></div>
                    <div class="h-16 w-1/3 skeleton rounded-xl"></div>
                    <div class="h-24 skeleton rounded-xl"></div>
                    <div class="h-32 skeleton rounded-xl"></div>
                    <div class="h-20 skeleton rounded-xl"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="h-14 skeleton rounded-xl"></div>
                        <div class="h-14 skeleton rounded-xl"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Container -->
        <div id="productContainer" class="hidden animate-fade-in">
            <!-- Product will be loaded here by JavaScript -->
            <div id="productViewer"></div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-16 lg:py-24 animate-scale-in">
            <div class="glass rounded-3xl p-12 max-w-2xl mx-auto">
                <div class="w-24 h-24 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-4">Product Not Found</h2>
                <p class="text-gray-400 text-lg mb-8" id="errorMessage">The product you're looking for is not available or has been removed.</p>
                <a href="index.html" class="inline-flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-jmp-gold to-jmp-gold-light text-black font-semibold rounded-2xl hover:scale-105 transition-all duration-300 shadow-lg shadow-jmp-gold/20">
                    <i class="fas fa-home"></i>
                    Return to Homepage
                </a>
            </div>
        </div>
    </main>

    <!-- Cart Panel -->
    <div id="cartOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden transition-opacity duration-300"></div>
    
    <div id="cartPanel" class="fixed top-0 right-0 w-full max-w-md h-full bg-gradient-to-b from-jmp-darker to-jmp-dark z-50 shadow-2xl translate-x-full transition-transform duration-500 ease-out-expo border-l border-white/10">
        <div class="flex flex-col h-full">
            <!-- Cart Header -->
            <div class="p-6 border-b border-white/10">
                <div class="flex items-center justify-between">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-3">
                        <i class="fas fa-shopping-bag text-jmp-gold"></i>
                        Your Cart
                    </h3>
                    <button class="close-cart w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-gray-400 hover:text-red-500 hover:border-red-500/30 hover:bg-red-500/10 transition-all duration-300">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Cart Items -->
            <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4">
                <!-- Cart items will be loaded here -->
            </div>
            
            <!-- Cart Footer -->
            <div class="p-6 border-t border-white/10 bg-black/20">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-400">Total:</span>
                    <span id="cartTotal" class="text-2xl font-bold text-jmp-gold">₦0</span>
                </div>
                <button id="checkoutButton" class="w-full mb-3 px-6 py-4 bg-gradient-to-r from-jmp-gold to-jmp-gold-light text-black font-semibold rounded-2xl hover:scale-[1.02] transition-all duration-300 shadow-lg shadow-jmp-gold/20 flex items-center justify-center gap-3">
                    <i class="fas fa-shopping-bag"></i>
                    Checkout
                </button>
                <a href="#" id="whatsappCheckout" target="_blank" class="block w-full px-6 py-4 bg-[#25d366] text-white font-semibold rounded-2xl hover:bg-[#1da851] hover:scale-[1.02] transition-all duration-300 text-center flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp text-xl"></i>
                    WhatsApp Order
                </a>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="fixed top-4 right-4 z-[100] space-y-2"></div>

    <!-- Main app.js -->
    <script src="app.js"></script>
    
    <!-- Page-specific UI interactions -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Cart panel interactions
            const cartBtn = document.getElementById('cartBtn');
            const closeCartBtn = document.querySelector('.close-cart');
            const cartOverlay = document.getElementById('cartOverlay');
            const cartPanel = document.getElementById('cartPanel');
            
            function openCart() {
                cartPanel.classList.remove('translate-x-full');
                cartOverlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
            
            function closeCart() {
                cartPanel.classList.add('translate-x-full');
                cartOverlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
            
            if (cartBtn) {
                cartBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    openCart();
                });
            }
            
            if (closeCartBtn) {
                closeCartBtn.addEventListener('click', closeCart);
            }
            
            if (cartOverlay) {
                cartOverlay.addEventListener('click', closeCart);
            }
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeCart();
                }
            });
        });
    </script>
</body>
</html>
