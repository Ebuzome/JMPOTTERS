<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shopping Cart | JMPOTTERS</title>
    
    <!-- Premium Icon Pack: Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="assets/js/shared-layout.js" defer></script>
    <script src="app.js" defer></script>
    
    <link rel="stylesheet" href="assets/css/shared-layout.css">
    
    <style>
        :root {
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;
            --success-500: #22C55E;
            --danger-500: #EF4444;
            --warning-500: #EAB308;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --radius: 0.5rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            
            --glass-dark: rgba(12, 15, 21, 0.92);
            --glass-blur: blur(16px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            min-height: 100vh;
        }
        
        .dark-mode body {
            background: var(--gray-900);
            color: var(--gray-200);
        }
        
        /* ========== HEADER ========== */
        
        /* Mobile Navigation */
        
        /* ========== MAIN CONTENT ========== */
        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 110px 1.5rem 3rem;
        }
        
        .cart-header-section {
            margin-bottom: 2rem;
        }
        
        .cart-header-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .dark-mode .cart-header-section h1 {
            color: var(--gray-100);
        }
        
        .cart-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        
        @media (min-width: 1024px) {
            .cart-container {
                grid-template-columns: 1fr 380px;
            }
        }
        
        /* Cart Items Table */
        .cart-items-container {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        
        .dark-mode .cart-items-container {
            background: #1e293b;
        }
        
        .cart-table-header {
            display: none;
            padding: 1rem 1.5rem;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
            color: var(--gray-600);
        }
        
        @media (min-width: 768px) {
            .cart-table-header {
                display: grid;
                grid-template-columns: 3fr 1fr 1fr 0.5fr;
                gap: 1rem;
            }
        }
        
        .dark-mode .cart-table-header {
            background: #0f172a;
            border-bottom-color: #334155;
            color: #94a3b8;
        }
        
        .cart-items-list {
            padding: 0.5rem;
        }
        
        .cart-product-info {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .cart-product-image {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--gray-100);
            flex-shrink: 0;
        }
        
        .cart-product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .cart-product-details h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--gray-800);
        }
        
        .dark-mode .cart-product-details h3 {
            color: var(--gray-100);
        }
        
        .cart-product-variant {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }
        
        .cart-product-price {
            font-weight: 600;
            color: var(--primary-600);
        }
        
        @media (min-width: 768px) {
            .cart-product-price {
                text-align: center;
            }
        }
        
        .cart-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .quantity-btn {
            width: 32px;
            height: 32px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .quantity-btn:hover {
            background: var(--primary-500);
            border-color: var(--primary-500);
            color: white;
        }
        
        .dark-mode .quantity-btn {
            background: #334155;
            border-color: #475569;
            color: var(--gray-200);
        }
        
        .cart-quantity input {
            width: 50px;
            height: 32px;
            text-align: center;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-weight: 600;
        }
        
        .dark-mode .cart-quantity input {
            background: #334155;
            border-color: #475569;
            color: white;
        }
        
        .cart-item-total {
            font-weight: 700;
            font-size: 1rem;
            color: var(--gray-800);
        }
        
        @media (min-width: 768px) {
            .cart-item-total {
                text-align: center;
            }
        }
        
        .cart-remove-btn {
            background: none;
            border: none;
            color: var(--danger-500);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            width: 32px;
            height: 32px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cart-remove-btn:hover {
            background: #fee2e2;
            transform: scale(1.1);
        }
        
        /* Cart Summary */
        .cart-summary {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 100px;
        }
        
        .dark-mode .cart-summary {
            background: #1e293b;
        }
        
        .cart-summary h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .dark-mode .cart-summary h3 {
            border-bottom-color: #334155;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
        }
        
        .summary-row.total {
            border-top: 1px solid var(--gray-200);
            margin-top: 0.5rem;
            padding-top: 1rem;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }
        
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        
        .continue-shopping {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-600);
            text-decoration: none;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        
        .continue-shopping:hover {
            gap: 0.75rem;
        }
        
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: var(--radius-xl);
        }
        
        .dark-mode .empty-cart {
            background: #1e293b;
        }
        
        .empty-cart-icon {
            font-size: 4rem;
            color: var(--gray-400);
            margin-bottom: 1rem;
        }
        
        .empty-cart h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .empty-cart p {
            color: var(--gray-500);
            margin-bottom: 1.5rem;
        }
        
        /* Footer */
        footer {
            background: linear-gradient(145deg, #0a0d12 0%, #05070a 100%);
            color: #eef2f5;
            padding: 64px 0 32px;
            margin-top: 80px;
            border-top: 1px solid rgba(99, 102, 241, 0.25);
        }
        @media (min-width: 640px) {
        }
        @media (min-width: 768px) {
        }
        .footer-column h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary-400);
            font-weight: 600;
            position: relative;
        }
        .footer-links li {
            margin-bottom: 10px;
        }
        .footer-links a {
            color: #cfdee9;
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer-links a:hover {
            color: var(--primary-400);
            transform: translateX(5px);
        }
        .social-links a {
            background: rgba(255,255,255,0.06);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .social-links a:hover {
            background: var(--primary-600);
            transform: translateY(-3px);
            color: #0a0d12;
        }
        
        @media (max-width: 768px) {
            main {
                padding: 100px 1rem 2rem;
            }
            .cart-product-info {
                flex-direction: column;
                text-align: center;
            }
            .cart-quantity {
                justify-content: center;
            }
            .cart-remove-btn {
                position: absolute;
                top: 0.5rem;
                right: 0.5rem;
            }
        }
    </style>
</head>
<body>
        <!-- Shared header and mobile nav injected by shared-layout.js -->
    <div id="shared-header"></div>
    <div id="shared-mobile-nav"></div>

    <!-- Main Content -->
    <main>
        <div class="cart-header-section">
            <h1><i class='bx bx-shopping-bag'></i> Shopping Cart</h1>
        </div>

        <div id="cartContent" class="cart-container">
            <!-- Loading State -->
            <div class="cart-items-container" id="cartItemsContainer">
                <div class="empty-cart" style="padding: 3rem;">
                    <div class="empty-cart-icon"><i class='bx bx-loader-alt bx-spin'></i></div>
                    <p>Loading your cart...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->    <!-- Shared footer and WhatsApp float injected by shared-layout.js -->
    <div id="shared-footer"></div><script>
        // Helper functions
        function formatPrice(price) {
            return `₦${parseInt(price || 0).toLocaleString()}`;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getImageUrl(categorySlug, imageFilename) {
            if (!imageFilename) return '';
            if (imageFilename.startsWith('http')) return imageFilename;
            const baseUrl = 'https://ebuzome.github.io/JMPOTTERS/assets/images/';
            const paths = {
                'mensfootwear': 'mensfootwear/',
                'womensfootwear': '',
                'bags': '',
                'household': 'household2/',
                'kids': 'kids/',
                'accessories': 'accessories/',
                'healthcare': ''
            };
            const folder = paths[categorySlug] || '';
            return baseUrl + folder + imageFilename;
        }
        
        function showNotification(message, type = 'info') {
            let container = document.getElementById('notificationContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'notificationContainer';
                container.style.cssText = 'position: fixed; top: 90px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;';
                document.body.appendChild(container);
            }
            const notification = document.createElement('div');
            notification.style.cssText = 'background: white; padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border-left: 4px solid #22c55e; margin-bottom: 10px; animation: slideIn 0.3s ease;';
            notification.innerHTML = `<span>${message}</span><button style="background:none;border:none;margin-left:12px;cursor:pointer" onclick="this.parentElement.remove()">✕</button>`;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('jmpotters_cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCount = document.getElementById('cartCount');
            if (cartCount) {
                cartCount.textContent = totalItems;
                cartCount.style.display = totalItems > 0 ? 'flex' : 'none';
            }
        }
        
        function saveCart(cart) {
            localStorage.setItem('jmpotters_cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }
        
        function updateQuantity(productId, colorName, sizeValue, change) {
            let cart = JSON.parse(localStorage.getItem('jmpotters_cart')) || [];
            const index = cart.findIndex(item => 
                item.product_id === productId && 
                item.color_name === colorName && 
                item.size_value === sizeValue
            );
            if (index !== -1) {
                const newQty = cart[index].quantity + change;
                if (newQty <= 0) {
                    cart.splice(index, 1);
                    showNotification('Item removed from cart', 'info');
                } else {
                    cart[index].quantity = newQty;
                }
                saveCart(cart);
            }
        }
        
        function removeItem(productId, colorName, sizeValue) {
            let cart = JSON.parse(localStorage.getItem('jmpotters_cart')) || [];
            cart = cart.filter(item => 
                !(item.product_id === productId && 
                  item.color_name === colorName && 
                  item.size_value === sizeValue)
            );
            saveCart(cart);
            showNotification('Item removed from cart', 'info');
        }
        
        async function proceedToCheckout() {
            const cart = JSON.parse(localStorage.getItem('jmpotters_cart')) || [];
            if (cart.length === 0) {
                showNotification('Your cart is empty', 'warning');
                return;
            }
            const user = JSON.parse(localStorage.getItem('jmpotters_user'));
            if (user && user.address && user.city && user.state) {
                if (window.JMPOTTERS && window.JMPOTTERS.proceedToCheckout) {
                    window.JMPOTTERS.proceedToCheckout();
                } else {
                    showNotification('Checkout system not ready', 'warning');
                }
            } else if (user) {
                sessionStorage.setItem('checkoutRedirect', window.location.href);
                window.location.href = 'register.html';
            } else {
                sessionStorage.setItem('checkoutRedirect', window.location.href);
                window.location.href = 'register.html';
            }
        }
        
        async function renderCart() {
            const cart = JSON.parse(localStorage.getItem('jmpotters_cart')) || [];
            const container = document.getElementById('cartItemsContainer');
            const summaryContainer = document.querySelector('.cart-summary');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon"><i class='bx bx-cart'></i></div>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added any items yet.</p>
                        <a href="index.html" class="btn" style="display: inline-flex; align-items: center; gap: 0.5rem; background: var(--primary-500); color: white; padding: 0.75rem 1.5rem; border-radius: 2rem; text-decoration: none;">Continue Shopping <i class='bx bx-right-arrow-alt'></i></a>
                    </div>
                `;
                if (summaryContainer) summaryContainer.remove();
                return;
            }
            
            let itemsHtml = `
                <div class="cart-items-container">
                    <div class="cart-table-header">
                        <div>Product</div>
                        <div style="text-align: center;">Price</div>
                        <div style="text-align: center;">Quantity</div>
                        <div style="text-align: center;">Total</div>
                    </div>
                    <div class="cart-items-list" id="cartItemsList">
            `;
            
            let subtotal = 0;
            
            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const itemTotal = (item.price || 0) * item.quantity;
                subtotal += itemTotal;
                const imageUrl = getImageUrl(item.category_slug, item.image_url);
                let variantText = '';
                if (item.color_name) variantText += item.color_name;
                if (item.size_value) variantText += (variantText ? ' / ' : '') + item.size_value;
                
                itemsHtml += `
                    <div class="cart-item" data-product-id="${item.product_id}" data-color="${item.color_name || ''}" data-size="${item.size_value || ''}">
                        <div class="cart-product-info">
                            <div class="cart-product-image">
                                ${imageUrl ? `<img src="${imageUrl}" alt="${escapeHtml(item.name)}" onerror="this.src='https://via.placeholder.com/80?text=No+Image'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f3f4f6;"><i class="bx bx-image"></i></div>'}
                            </div>
                            <div class="cart-product-details">
                                <h3>${escapeHtml(item.name)}</h3>
                                ${variantText ? `<div class="cart-product-variant">${escapeHtml(variantText)}</div>` : ''}
                                <div class="cart-product-price-mobile" style="display: none; margin-top: 0.5rem; font-weight: 600;">${formatPrice(item.price)}</div>
                            </div>
                        </div>
                        <div class="cart-product-price">${formatPrice(item.price)}</div>
                        <div class="cart-quantity">
                            <button class="quantity-btn" onclick="updateQuantity(${item.product_id}, '${item.color_name || ''}', '${item.size_value || ''}', -1)">-</button>
                            <input type="number" value="${item.quantity}" min="1" max="99" readonly>
                            <button class="quantity-btn" onclick="updateQuantity(${item.product_id}, '${item.color_name || ''}', '${item.size_value || ''}', 1)">+</button>
                        </div>
                        <div class="cart-item-total">${formatPrice(itemTotal)}</div>
                        <button class="cart-remove-btn" onclick="removeItem(${item.product_id}, '${item.color_name || ''}', '${item.size_value || ''}')"><i class="bx bx-trash"></i></button>
                    </div>
                `;
            }
            
            const shippingFee = subtotal >= 50000 ? 0 : 2000;
            const grandTotal = subtotal + shippingFee;
            
            itemsHtml += `
                    </div>
                </div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>${formatPrice(subtotal)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>${shippingFee === 0 ? 'Free' : formatPrice(shippingFee)}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span style="color: var(--primary-600);">${formatPrice(grandTotal)}</span>
                    </div>
                    <button class="checkout-btn" id="cartCheckoutBtn">Proceed to Checkout</button>
                    <a href="index.html" class="continue-shopping"><i class="bx bx-arrow-back"></i> Continue Shopping</a>
                </div>
            `;
            
            container.innerHTML = itemsHtml;
            
            // Attach checkout button event
            const checkoutBtn = document.getElementById('cartCheckoutBtn');
            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', proceedToCheckout);
            }
        }
        
        // Mobile nav, cart icon, wishlist icon handled by shared-layout.js
        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
            renderCart();
        });
        
        window.updateQuantity = updateQuantity;
        window.removeItem = removeItem;
    </script>
</body>
</html>
