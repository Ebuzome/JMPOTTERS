<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Order Invoice | JMPOTTERS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
    
    <style>
        /* ===== CSS VARIABLES - MATCHING ADMIN DASHBOARD ===== */
        :root {
            --primary-50: #EEF2FF;
            --primary-100: #E0E7FF;
            --primary-200: #C7D2FE;
            --primary-300: #A5B4FC;
            --primary-400: #818CF8;
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;
            --primary-800: #3730A3;
            --primary-900: #312E81;
            
            --success-50: #F0FDF4;
            --success-500: #22C55E;
            --success-600: #16A34A;
            --success-700: #15803D;
            
            --danger-50: #FEF2F2;
            --danger-500: #EF4444;
            --danger-600: #DC2626;
            --danger-700: #B91C1C;
            
            --warning-50: #FEFCE8;
            --warning-500: #EAB308;
            --warning-600: #CA8A04;
            --warning-700: #A16207;
            
            --info-50: #ECFEFF;
            --info-500: #06B6D4;
            --info-600: #0891B2;
            
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            --dark-bg: #0F172A;
            --dark-surface: #1E293B;
            --dark-surface-2: #334155;
            --dark-text: #F1F5F9;
            --dark-text-muted: #94A3B8;
            
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Dark Mode */
        .dark-mode {
            --primary-50: #1E293B;
            --primary-100: #1E293B;
            --primary-500: #818CF8;
            --primary-600: #6366F1;
            
            --gray-50: #0F172A;
            --gray-100: #1E293B;
            --gray-200: #334155;
            --gray-300: #475569;
            --gray-400: #64748B;
            --gray-500: #94A3B8;
            --gray-600: #CBD5E1;
            --gray-700: #E2E8F0;
            --gray-800: #F1F5F9;
            --gray-900: #F8FAFC;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: var(--space-4);
            transition: background-color var(--transition);
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
        }
        
        .invoice-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .invoice-container {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            transition: background-color var(--transition);
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .dark-mode .invoice-container {
            background: var(--dark-surface);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Header */
        .invoice-header {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            padding: var(--space-8) var(--space-6);
            text-align: center;
            position: relative;
        }
        
        .dark-mode .invoice-header {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
        }
        
        .invoice-logo {
            width: 5rem;
            height: 5rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-4);
            font-size: 2rem;
            color: white;
        }
        
        .invoice-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-1);
        }
        
        .invoice-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
        }
        
        .invoice-number {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            padding: var(--space-2) var(--space-5);
            border-radius: var(--radius);
            margin-top: var(--space-5);
            font-family: 'SF Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            letter-spacing: 0.5px;
        }
        
        /* Body */
        .invoice-body {
            padding: var(--space-8);
        }
        
        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: var(--warning-50);
            color: var(--warning-700);
        }
        
        .dark-mode .status-pending {
            background: rgba(234, 179, 8, 0.15);
            color: #FBBF24;
        }
        
        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-6);
            margin-bottom: var(--space-8);
            padding-bottom: var(--space-6);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .dark-mode .info-grid {
            border-bottom-color: var(--dark-surface-2);
        }
        
        @media (min-width: 640px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .info-section h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--gray-500);
            margin-bottom: var(--space-3);
            font-weight: 600;
        }
        
        .dark-mode .info-section h3 {
            color: var(--dark-text-muted);
        }
        
        .info-section p {
            color: var(--gray-700);
            line-height: 1.6;
            font-size: 0.875rem;
        }
        
        .dark-mode .info-section p {
            color: var(--dark-text);
        }
        
        .info-section strong {
            color: var(--gray-900);
            font-weight: 600;
        }
        
        .dark-mode .info-section strong {
            color: var(--dark-text);
        }
        
        /* Order Summary */
        .order-summary {
            margin-bottom: var(--space-8);
        }
        
        .order-summary h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .dark-mode .order-summary h3 {
            color: var(--dark-text);
        }
        
        .order-summary h3 i {
            color: var(--primary-500);
        }
        
        /* Table */
        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
        }
        
        .dark-mode .table-wrapper {
            border-color: var(--dark-surface-2);
        }
        
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        
        .invoice-table th,
        .invoice-table td {
            padding: var(--space-3) var(--space-4);
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .dark-mode .invoice-table th,
        .dark-mode .invoice-table td {
            border-bottom-color: var(--dark-surface-2);
        }
        
        .invoice-table th {
            background: var(--gray-50);
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .dark-mode .invoice-table th {
            background: var(--dark-surface-2);
            color: var(--dark-text-muted);
        }
        
        .invoice-table td {
            color: var(--gray-600);
        }
        
        .dark-mode .invoice-table td {
            color: var(--dark-text-muted);
        }
        
        .invoice-table tr:last-child td {
            border-bottom: none;
        }
        
        @media (max-width: 640px) {
            .invoice-table th,
            .invoice-table td {
                padding: var(--space-2);
                font-size: 0.75rem;
            }
        }
        
        /* Totals */
        .totals {
            margin-top: var(--space-6);
            padding-top: var(--space-6);
            border-top: 2px solid var(--gray-200);
            text-align: right;
        }
        
        .dark-mode .totals {
            border-top-color: var(--dark-surface-2);
        }
        
        .totals-row {
            display: flex;
            justify-content: flex-end;
            gap: var(--space-8);
            margin-bottom: var(--space-2);
            font-size: 0.875rem;
        }
        
        .totals-label {
            color: var(--gray-600);
            font-weight: 500;
        }
        
        .totals-value {
            font-weight: 600;
            color: var(--gray-800);
            min-width: 120px;
            text-align: right;
        }
        
        .dark-mode .totals-value {
            color: var(--dark-text);
        }
        
        .grand-total {
            margin-top: var(--space-3);
            padding-top: var(--space-3);
            border-top: 1px solid var(--gray-300);
        }
        
        .dark-mode .grand-total {
            border-top-color: var(--dark-surface);
        }
        
        .grand-total .totals-label,
        .grand-total .totals-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-600);
        }
        
        .dark-mode .grand-total .totals-label,
        .dark-mode .grand-total .totals-value {
            color: var(--primary-400);
        }
        
        /* Payment Instruction */
        .payment-instruction {
            margin-top: var(--space-6);
            text-align: center;
            padding: var(--space-5);
            background: linear-gradient(135deg, var(--primary-50), rgba(99, 102, 241, 0.03));
            border-radius: var(--radius-lg);
            border: 1px solid rgba(99, 102, 241, 0.15);
        }
        
        .dark-mode .payment-instruction {
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.08), rgba(129, 140, 248, 0.03));
            border-color: rgba(129, 140, 248, 0.2);
        }
        
        .payment-instruction i {
            font-size: 1.75rem;
            color: var(--primary-500);
            margin-bottom: var(--space-2);
        }
        
        .payment-instruction p {
            font-size: 0.85rem;
            color: var(--gray-600);
            line-height: 1.5;
        }
        
        .dark-mode .payment-instruction p {
            color: var(--dark-text-muted);
        }
        
        .payment-instruction strong {
            color: var(--primary-600);
        }
        
        /* Footer */
        .invoice-footer {
            background: var(--gray-50);
            padding: var(--space-5);
            text-align: center;
            border-top: 1px solid var(--gray-200);
        }
        
        .dark-mode .invoice-footer {
            background: var(--dark-surface-2);
            border-top-color: var(--dark-surface);
        }
        
        .invoice-footer p {
            font-size: 0.75rem;
            color: var(--gray-500);
        }
        
        .dark-mode .invoice-footer p {
            color: var(--dark-text-muted);
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            justify-content: center;
            margin-top: var(--space-6);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            font-family: inherit;
            text-decoration: none;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-secondary {
            background: white;
            border: 1px solid var(--gray-300);
            color: var(--gray-700);
        }
        
        .dark-mode .btn-secondary {
            background: var(--dark-surface);
            border-color: var(--dark-surface-2);
            color: var(--dark-text);
        }
        
        .btn-secondary:hover {
            border-color: var(--primary-500);
            color: var(--primary-600);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary-500);
            color: var(--primary-600);
        }
        
        .dark-mode .btn-outline {
            color: var(--primary-400);
            border-color: var(--primary-400);
        }
        
        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }
        
        /* Loading & Error States */
        .loading-state,
        .error-state {
            text-align: center;
            padding: var(--space-12) var(--space-4);
        }
        
        .loading-spinner {
            width: 3rem;
            height: 3rem;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--space-4);
        }
        
        .dark-mode .loading-spinner {
            border-color: var(--dark-surface-2);
            border-top-color: var(--primary-500);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-state p,
        .error-state p {
            color: var(--gray-600);
            margin-top: var(--space-2);
        }
        
        .dark-mode .loading-state p,
        .dark-mode .error-state p {
            color: var(--dark-text-muted);
        }
        
        .error-state i {
            font-size: 3rem;
            color: var(--danger-500);
            margin-bottom: var(--space-4);
        }
        
        /* Dark Mode Toggle */
        .theme-toggle {
            position: fixed;
            bottom: var(--space-4);
            right: var(--space-4);
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: white;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            z-index: 100;
        }
        
        .dark-mode .theme-toggle {
            background: var(--dark-surface);
            border-color: var(--dark-surface-2);
            color: var(--dark-text);
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-xl);
        }
        
        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .action-buttons,
            .theme-toggle {
                display: none !important;
            }
            .invoice-container {
                box-shadow: none;
                border-radius: 0;
            }
            .invoice-header {
                background: #0F172A;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: var(--space-3);
            }
            .invoice-body {
                padding: var(--space-4);
            }
            .invoice-header {
                padding: var(--space-5) var(--space-4);
            }
            .invoice-header h1 {
                font-size: 1.35rem;
            }
            .invoice-logo {
                width: 3.5rem;
                height: 3.5rem;
                font-size: 1.5rem;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            .totals-row {
                gap: var(--space-4);
                font-size: 0.8rem;
            }
            .totals-value {
                min-width: 90px;
            }
        }
        
        @media (min-width: 768px) {
            .invoice-body {
                padding: var(--space-8) var(--space-10);
            }
            .invoice-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Dark Mode Toggle -->
    <button class="theme-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="invoice-wrapper">
        <div id="invoiceContent" class="invoice-container">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading invoice...</p>
            </div>
        </div>
        
        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button class="btn btn-secondary" onclick="window.print()">
                <i class="fas fa-print"></i> Print Invoice
            </button>
            <button class="btn btn-secondary" onclick="downloadPDF()">
                <i class="fas fa-download"></i> Download PDF
            </button>
            <button class="btn btn-outline" onclick="shareViaWhatsApp()">
                <i class="fab fa-whatsapp"></i> Share via WhatsApp
            </button>
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i> Continue Shopping
            </a>
        </div>
    </div>

    <script>
        // Dark mode management
        function initDarkMode() {
            const darkMode = localStorage.getItem('invoiceDarkMode') === 'true';
            if (darkMode) {
                document.body.classList.add('dark-mode');
                const icon = document.querySelector('.theme-toggle i');
                if (icon) icon.classList.replace('fa-moon', 'fa-sun');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('invoiceDarkMode', isDark);
            const icon = document.querySelector('.theme-toggle i');
            if (icon) {
                if (isDark) icon.classList.replace('fa-moon', 'fa-sun');
                else icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function shareViaWhatsApp() {
            const orderNumber = document.querySelector('.invoice-number')?.innerText || '';
            const grandTotal = document.querySelector('.grand-total .totals-value')?.innerText || '₦0';
            const message = encodeURIComponent(
                `*JMPOTTERS Order Confirmation*\n\n` +
                `Order Number: ${orderNumber}\n` +
                `Total Amount: ${grandTotal}\n\n` +
                `Thank you for shopping with JMPOTTERS!`
            );
            window.open(`https://wa.me/2348139583320?text=${message}`, '_blank');
        }
        
        async function loadInvoice() {
            // Wait for JMPOTTERS to be available
            let attempts = 0;
            while (!window.JMPOTTERS && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            if (!window.JMPOTTERS) {
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>App not loaded. Please refresh.</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Go Home</a>
                    </div>
                `;
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const orderNumber = urlParams.get('order');
            
            if (!orderNumber) {
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>No order specified</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Go Home</a>
                    </div>
                `;
                return;
            }
            
            try {
                const order = await window.JMPOTTERS.getOrderByNumber(orderNumber);
                
                if (!order) {
                    throw new Error('Order not found');
                }
                
                const items = order.items || [];
                const subtotal = order.total_amount || 0;
                const shippingFee = order.shipping_fee || 0;
                const grandTotal = order.grand_total || subtotal + shippingFee;
                const orderDate = new Date(order.created_at).toLocaleDateString('en-NG', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
                
                const statusText = order.status === 'pending' ? 'Pending' : 
                                  order.status === 'processing' ? 'Processing' :
                                  order.status === 'shipped' ? 'Shipped' :
                                  order.status === 'delivered' ? 'Delivered' : 'Cancelled';
                
                const paymentStatusText = order.payment_status === 'paid' ? 'Paid' : 'Pending Payment';
                
                let itemsHtml = '';
                if (items.length > 0) {
                    items.forEach(item => {
                        itemsHtml += `
                            <tr>
                                <td>${escapeHtml(item.name || 'Product')}</td>
                                <td>${item.color_name ? escapeHtml(item.color_name) + (item.size_value ? ' / ' + escapeHtml(item.size_value) : '') : '-'}</td>
                                <td style="text-align: center;">${item.quantity}</td>
                                <td style="text-align: right;">₦${(item.price || 0).toLocaleString()}</td>
                                <td style="text-align: right;">₦${((item.price || 0) * item.quantity).toLocaleString()}</td>
                            </tr>
                        `;
                    });
                } else {
                    itemsHtml = `<tr><td colspan="5" style="text-align: center;">No items found</td></tr>`;
                }
                
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="invoice-header">
                        <div class="invoice-logo">
                            <i class="fas fa-store"></i>
                        </div>
                        <h1>JMPOTTERS</h1>
                        <p>Premium Quality Products</p>
                        <div class="invoice-number">${order.order_number}</div>
                    </div>
                    
                    <div class="invoice-body">
                        <div class="info-grid">
                            <div class="info-section">
                                <h3><i class="fas fa-user"></i> Billing Details</h3>
                                <p>
                                    <strong>${escapeHtml(order.full_name || order.user_name || 'N/A')}</strong><br>
                                    ${escapeHtml(order.user_email || 'No email provided')}<br>
                                    ${escapeHtml(order.user_phone || 'No phone provided')}
                                </p>
                            </div>
                            <div class="info-section">
                                <h3><i class="fas fa-truck"></i> Shipping Address</h3>
                                <p>
                                    ${escapeHtml(order.shipping_address || 'No address provided')}<br>
                                    ${order.city ? escapeHtml(order.city) + ', ' : ''}${order.state ? escapeHtml(order.state) : ''}
                                </p>
                            </div>
                        </div>
                        
                        <div class="info-grid">
                            <div class="info-section">
                                <h3><i class="far fa-calendar-alt"></i> Order Date</h3>
                                <p>${orderDate}</p>
                            </div>
                            <div class="info-section">
                                <h3><i class="fas fa-chart-line"></i> Order Status</h3>
                                <p><span class="status-badge status-pending"><i class="fas fa-clock"></i> ${statusText}</span></p>
                            </div>
                        </div>
                        
                        <div class="order-summary">
                            <h3><i class="fas fa-receipt"></i> Order Summary</h3>
                            <div class="table-wrapper">
                                <table class="invoice-table">
                                    <thead>
                                        <tr>
                                            <th>Product</th>
                                            <th>Variant</th>
                                            <th style="text-align: center;">Qty</th>
                                            <th style="text-align: right;">Price</th>
                                            <th style="text-align: right;">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${itemsHtml}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div class="totals">
                                <div class="totals-row">
                                    <span class="totals-label">Subtotal:</span>
                                    <span class="totals-value">₦${subtotal.toLocaleString()}</span>
                                </div>
                                <div class="totals-row">
                                    <span class="totals-label">Shipping Fee:</span>
                                    <span class="totals-value">₦${shippingFee.toLocaleString()}</span>
                                </div>
                                <div class="totals-row grand-total">
                                    <span class="totals-label">Grand Total:</span>
                                    <span class="totals-value">₦${grandTotal.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="payment-instruction">
                            <i class="fas fa-credit-card"></i>
                            <p>Payment Status: <strong>${paymentStatusText}</strong></p>
                            <p style="font-size: 0.7rem; margin-top: var(--space-2);">
                                Please complete payment within 24 hours to confirm your order.
                            </p>
                        </div>
                    </div>
                    
                    <div class="invoice-footer">
                        <p>Thank you for shopping with JMPOTTERS!</p>
                        <p style="font-size: 0.65rem; margin-top: var(--space-1);">
                            For inquiries, contact us on WhatsApp: <strong>+234 813 958 3320</strong> | Email: hello@jmpotters.com
                        </p>
                    </div>
                `;
                
                document.getElementById('actionButtons').style.display = 'flex';
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('invoiceContent').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error: ${error.message}</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Go Home</a>
                    </div>
                `;
            }
        }
        
        function downloadPDF() {
            const element = document.getElementById('invoiceContent');
            const orderNumber = document.querySelector('.invoice-number')?.innerText || 'invoice';
            html2pdf().from(element).set({
                margin: 0.5,
                filename: `JMPOTTERS_${orderNumber}.pdf`,
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).save();
        }
        
        // Initialize
        initDarkMode();
        loadInvoice();
    </script>
</body>
</html>
