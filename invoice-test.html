<!DOCTYPE html>
<html>
<head>
    <title>Invoice Test</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Invoice Debug Tool</h1>
    <div id="output">Loading...</div>

    <script>
        const supabase = supabase.createClient(
            'https://tmpggeeuwdvlngvfncaa.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtcGdnZWV1d2R2bG5ndmZuY2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIxOTc0MDYsImV4cCI6MjA3Nzc3MzQwNn0.EKzkKWmzYMvQuN11vEjRTDHrUbh6dYXk7clxVsYQ0b4'
        );
        
        async function debug() {
            const output = document.getElementById('output');
            output.innerHTML = '🔍 Checking Supabase connection...<br>';
            
            // Test 1: Can we fetch any orders?
            output.innerHTML += '📦 Fetching orders from Supabase...<br>';
            
            const { data: orders, error: ordersError } = await supabase
                .from('orders')
                .select('order_number')
                .limit(5);
            
            if (ordersError) {
                output.innerHTML += `<span class="error">❌ Orders fetch failed: ${ordersError.message}</span><br>`;
                output.innerHTML += `<pre>${JSON.stringify(ordersError, null, 2)}</pre>`;
                return;
            }
            
            output.innerHTML += `<span class="success">✅ Success! Found ${orders.length} orders.</span><br>`;
            output.innerHTML += `<pre>Order numbers: ${JSON.stringify(orders.map(o => o.order_number), null, 2)}</pre>`;
            
            // Test 2: Check the URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const orderNumber = urlParams.get('order');
            
            output.innerHTML += `<br>📋 URL parameter 'order': <strong>${orderNumber || 'NOT PROVIDED'}</strong><br>`;
            
            if (!orderNumber) {
                output.innerHTML += `<span class="error">❌ No order number in URL. Use: ?order=JMP-26-0001</span><br>`;
                return;
            }
            
            // Test 3: Fetch the specific order
            output.innerHTML += `🔍 Fetching order: ${orderNumber}...<br>`;
            
            const { data: order, error: orderError } = await supabase
                .from('orders')
                .select('*')
                .eq('order_number', orderNumber)
                .single();
            
            if (orderError) {
                output.innerHTML += `<span class="error">❌ Order not found: ${orderError.message}</span><br>`;
                output.innerHTML += `💡 Try one of the order numbers from the list above.<br>`;
                return;
            }
            
            output.innerHTML += `<span class="success">✅ Order found!</span><br>`;
            output.innerHTML += `<pre>${JSON.stringify(order, null, 2)}</pre>`;
        }
        
        debug();
    </script>
</body>
</html>
